name: ServerGuardian Monitor

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Enable manual run from GitHub Web UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          QUILLIX_API_URL: ${{ secrets.QUILLIX_API_URL }}
          AFFILIATE_HEALTH_URL: ${{ secrets.AFFILIATE_HEALTH_URL }}
          STOCK_SENTINEL_URL: ${{ secrets.STOCK_SENTINEL_URL }}
          VISIONRETAIL_IQ_URL: ${{ secrets.VISIONRETAIL_IQ_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ENABLE_STOCK_SCRAPER: ${{ secrets.ENABLE_STOCK_SCRAPER }}
        run: python monitor_runner.py
